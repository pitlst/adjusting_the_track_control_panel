<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1920, height=1080, initial-scale=1.0">
    <title>LeaferJS 铁路调度示意图</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
    </style>
</head>
<body>
    <script src="https://unpkg.com/leafer-ui@1.0.2/dist/web.js"></script>
    <script>
        const { Leafer, Line, Rect, Group, Text, Path } = LeaferUI;

        const leafer = new Leafer({ 
            view: window,
            width: 1920,
            height: 1080,
            fill: '#000000'
        });

        // 径向渐变背景
        const bg = new Rect({
            x: 0, y: 0, width: 1920, height: 1080,
            fill: {
                type: 'radial',
                stops: [
                    { offset: 0, color: '#0d1424' },
                    { offset: 0.6, color: '#080c18' },
                    { offset: 1, color: '#000000' }
                ]
            }
        });
        leafer.add(bg);

        // 点状网格
        const grid = new Group();
        for (let x = 0; x < 1920; x += 28) {
            for (let y = 0; y < 1080; y += 28) {
                grid.add(new Rect({
                    x, y, width: 2, height: 2,
                    fill: '#1a2438', cornerRadius: 1
                }));
            }
        }
        leafer.add(grid);

        const C_TRACK = '#ffffff';
        const C_TRACK_W = 3;
        const C_GREEN = '#2ecc71';
        const C_BLUE  = '#3498db';

        const trackLayer = new Group();
        const labelLayer = new Group();
        const trainLayer = new Group();
        leafer.add(trackLayer);
        leafer.add(labelLayer);
        leafer.add(trainLayer);

        function track(pts, w = C_TRACK_W) {
            trackLayer.add(new Line({
                points: pts, stroke: C_TRACK, strokeWidth: w,
                strokeCap: 'round', strokeJoin: 'round'
            }));
        }

        function sw(pts) {
            trackLayer.add(new Line({
                points: pts, stroke: C_TRACK, strokeWidth: 2.5,
                strokeCap: 'round'
            }));
        }

        function dot(x, y, color, r = 6) {
            trackLayer.add(new Rect({
                x: x - r, y: y - r, width: r * 2, height: r * 2,
                fill: color, cornerRadius: r
            }));
        }

        function label(x, y, text, color = '#fff', size = 16) {
            labelLayer.add(new Text({
                x, y, text, fill: color, fontSize: size, fontWeight: 'bold'
            }));
        }

        // ================= 轨道布局 =================
        const Y1 = 120;
        const Y2 = 260;   // 1道
        const Y3 = 420;   // 上行
        const Y4 = 600;   // 调度站B
        const Y5 = 820;   // 调度站C / 3道
        const XL = 100;
        const XR = 1800;

        // 5条水平主轨道
        track([XL, Y1, XR, Y1]);
        track([XL, Y2, XR, Y2]);
        track([XL, Y3, XR, Y3]);
        track([XL, Y4, XR, Y4]);
        track([XL, Y5, XR, Y5]);

        // --- 调度站A (Y2↔Y3, x≈520) ---
        const XA = 520;
        trackLayer.add(new Rect({ x: XA - 3, y: Y2 - 15, width: 6, height: 30, fill: C_GREEN, cornerRadius: 3 }));
        trackLayer.add(new Rect({ x: XA - 3, y: Y3 - 15, width: 6, height: 30, fill: C_GREEN, cornerRadius: 3 }));
        sw([XA - 50, Y2, XA, Y3]);
        sw([XA - 50, Y3, XA, Y2]);
        sw([XA + 60, Y2, XA + 110, Y3]);
        sw([XA + 60, Y3, XA + 110, Y2]);
        label(XA + 130, Y2 + 30, '调度站A', C_GREEN, 14);
        label(XA + 130, Y3 - 40, '调度站A', C_GREEN, 14);

        // --- 调度站B (Y3↔Y4, x≈900) ---
        const XB = 900;
        trackLayer.add(new Rect({ x: XB - 3, y: Y3 - 15, width: 6, height: 30, fill: C_GREEN, cornerRadius: 3 }));
        trackLayer.add(new Rect({ x: XB - 3, y: Y4 - 15, width: 6, height: 30, fill: C_GREEN, cornerRadius: 3 }));
        sw([XB - 50, Y3, XB, Y4]);
        sw([XB - 50, Y4, XB, Y3]);
        sw([XB + 60, Y3, XB + 110, Y4]);
        sw([XB + 60, Y4, XB + 110, Y3]);
        label(XB + 130, Y3 + 30, '调度站B', C_GREEN, 14);
        label(XB + 130, Y4 - 40, '调度站B', C_GREEN, 14);

        // --- 调度站C (Y4↔Y5, x≈600) ---
        const XC = 600;
        trackLayer.add(new Rect({ x: XC - 3, y: Y4 - 15, width: 6, height: 30, fill: C_GREEN, cornerRadius: 3 }));
        trackLayer.add(new Rect({ x: XC - 3, y: Y5 - 15, width: 6, height: 30, fill: C_GREEN, cornerRadius: 3 }));
        sw([XC - 50, Y4, XC, Y5]);
        sw([XC - 50, Y5, XC, Y4]);
        sw([XC + 60, Y4, XC + 110, Y5]);
        sw([XC + 60, Y5, XC + 110, Y4]);
        label(XC + 130, Y4 + 30, '调度站C', C_GREEN, 14);
        label(XC + 130, Y5 - 40, '调度站C', C_GREEN, 14);

        // --- 右侧出口道岔 ---
        sw([1400, Y2, 1450, Y3, 1500, Y3]);
        sw([1500, Y2, 1450, Y3, 1400, Y3]);
        label(1520, Y3 - 40, '3道', C_BLUE, 15);
        dot(1520, Y3, C_GREEN);

        sw([1300, Y3, 1350, Y4, 1400, Y4]);
        sw([1400, Y3, 1350, Y4, 1300, Y4]);
        label(1420, Y4 - 40, '3道', C_BLUE, 15);
        dot(1420, Y4, C_GREEN);

        sw([1200, Y4, 1250, Y5, 1300, Y5]);
        label(1320, Y5 - 40, '2道', C_BLUE, 15);

        sw([800, Y5, 850, Y4, 900, Y4]);
        label(920, Y4 + 30, '调度站C', C_GREEN, 14);

        // --- 左侧标记 ---
        dot(XL, Y2, C_BLUE);
        label(60, Y2 - 10, '1道', C_BLUE, 16);

        dot(XL, Y3, C_BLUE);
        label(60, Y3 - 10, '上行', C_GREEN, 16);
        // 左向箭头（示意上行回段方向）
        labelLayer.add(new Path({
            x: 140, y: Y3 - 8,
            path: 'M20,4 L0,4 M5,0 L0,4 L5,8',
            stroke: C_GREEN, strokeWidth: 2, fill: 'none'
        }));

        dot(XL, Y5, C_BLUE);
        label(60, Y5 - 10, '3道', C_BLUE, 16);
        label(140, Y5 - 25, '上行', C_GREEN, 13);
        label(140, Y5 + 10, '下行', C_GREEN, 13);

        // 中间 2道 标记
        label(XA, Y2 - 35, '2道', C_BLUE, 15);
        dot(XA, Y2, C_BLUE);

        label(XB - 40, Y4 - 35, '2道', C_BLUE, 15);
        dot(XB - 40, Y4, C_BLUE);

        label(XC, Y4 - 35, '2道', C_BLUE, 15);
        dot(XC, Y4, C_BLUE);

        // ================= 火车 =================

        class Train {
            constructor(route, color, speed, reverse = false) {
                this.route = route;
                this.speed = speed;
                this.reverse = reverse;
                this.seg = reverse ? route.length - 2 : 0;
                this.prog = 0;
                this.g = new Group();

                this.g.add(new Rect({
                    x: -40, y: -10, width: 80, height: 20,
                    fill: color, cornerRadius: 10
                }));
                [-22, 0, 22].forEach(dx => {
                    this.g.add(new Rect({
                        x: dx - 7, y: -7, width: 14, height: 14,
                        fill: '#0f1720', cornerRadius: 2
                    }));
                });
                // 车头灯
                this.g.add(new Rect({
                    x: reverse ? -44 : 38, y: -4, width: 6, height: 8,
                    fill: '#fff', cornerRadius: 3
                }));

                trainLayer.add(this.g);
            }

            update() {
                if (!this.reverse) {
                    if (this.seg >= this.route.length - 1) { this.seg = 0; this.prog = 0; }
                    const a = this.route[this.seg], b = this.route[this.seg + 1];
                    const dx = b.x - a.x, dy = b.y - a.y, len = Math.hypot(dx, dy);
                    this.prog += this.speed;
                    if (this.prog >= len) { this.prog -= len; this.seg++; return this.update(); }
                    const t = this.prog / len;
                    this.g.set({
                        x: a.x + dx * t,
                        y: a.y + dy * t,
                        rotation: Math.atan2(dy, dx) * 180 / Math.PI
                    });
                } else {
                    if (this.seg < 0) { this.seg = this.route.length - 2; this.prog = 0; }
                    const a = this.route[this.seg + 1], b = this.route[this.seg];
                    const dx = b.x - a.x, dy = b.y - a.y, len = Math.hypot(dx, dy);
                    this.prog += this.speed;
                    if (this.prog >= len) { this.prog -= len; this.seg--; return this.update(); }
                    const t = this.prog / len;
                    this.g.set({
                        x: a.x + dx * t,
                        y: a.y + dy * t,
                        rotation: Math.atan2(dy, dx) * 180 / Math.PI + 180
                    });
                }
            }
        }

        const pY3 = [{x:XL,y:Y3}, {x:500,y:Y3}, {x:900,y:Y3}, {x:1300,y:Y3}, {x:XR,y:Y3}];
        const pY4 = [{x:XR,y:Y4}, {x:1300,y:Y4}, {x:900,y:Y4}, {x:500,y:Y4}, {x:XL,y:Y4}];
        const pY5 = [{x:XL,y:Y5}, {x:600,y:Y5}, {x:1200,y:Y5}, {x:XR,y:Y5}];
        const pY2 = [{x:XL,y:Y2}, {x:500,y:Y2}, {x:900,y:Y2}, {x:1400,y:Y2}, {x:XR,y:Y2}];

        const trains = [
            new Train(pY3, '#5dade2', 3.5),       // 上行 左→右
            new Train(pY4, '#5dade2', 2.8, true), // 3道 右→左（反向）
            new Train(pY5, '#5dade2', 2.2),       // 下行 左→右
            new Train(pY2, '#85c1e9', 4.0),       // 1道 快车
        ];

        trains[1].prog = 200;
        trains[2].prog = 400;
        trains[3].prog = 100;

        function loop() { trains.forEach(t => t.update()); requestAnimationFrame(loop); }
        loop();
    </script>
</body>
</html>
